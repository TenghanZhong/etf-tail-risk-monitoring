name: Clean core wording

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clean source wording
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          headers = {
              "src/tail_risk_monitoring_core.py": '''"""Core implementation of reliability-aware ETF tail-risk monitoring.

This module contains the rolling walk-forward backtest, uncertainty and quality
diagnostics, fallback rules, component ablations, and input-degradation tests.
"""''',
              "src/gjr_garch_comparison_core.py": '''"""Core implementation of the GJR-GARCH benchmark comparison.

This module evaluates the monitoring service and the GJR-GARCH(1,1)-t VaR
benchmark under a common rolling prediction schedule.
"""''',
              "src/quality_layer_core.py": '''"""Core implementation of the input-quality validation experiment.

This module evaluates prediction-time missingness, stale-price records, and
invalid OHLC relationships under the monitoring protocol.
"""''',
          }

          replacements = {
              "# Paper-facing uncertainty diagnostics": "# Uncertainty diagnostics",
              "# Paper-facing rolling low/elevated diagnostic state.": "# Rolling low/elevated diagnostic state.",
              "Paper-facing diagnostic uncertainty state:": "Diagnostic uncertainty state:",
              "Legacy fixed-threshold uncertainty buckets kept only for alert logic.": "Fixed-threshold uncertainty buckets used for alert logic.",
              "# Main service backtest (paper default)": "# Main service backtest",
              "# Added: quality validation experiment": "# Quality validation experiment",
              "**NEW**: ": "",
              "paper-facing": "reported",
              "Paper-facing": "Reported",
          }

          for filename, header in headers.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              text = re.sub(r'\A\s*""".*?"""', header, text, count=1, flags=re.DOTALL)
              for old, new in replacements.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")

          prohibited = re.compile(
              r'chatgpt|openai|copilot|claude|gemini|as an ai|ai[- ]generated|generated by ai|'
              r'/Users/|C:\\\\Users\\\\|tenghanz@|keyuanwu@|what is added relative|'
              r'extended version|\*\*NEW\*\*',
              re.IGNORECASE,
          )
          for path in Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts:
                  continue
              if path.suffix.lower() not in {".py", ".md", ".txt", ".yml", ".yaml"}:
                  continue
              match = prohibited.search(path.read_text(encoding="utf-8", errors="ignore"))
              if match:
                  raise RuntimeError(f"Prohibited wording remains in {path}: {match.group(0)}")

          Path(".github/workflows/clean_core_wording.yml").unlink()
          PY

      - name: Validate and commit
        run: |
          python -m py_compile run_tail_risk_monitoring.py compare_gjr_garch.py quality-layer.py plot.py src/*.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean core source wording"
          git push origin main
