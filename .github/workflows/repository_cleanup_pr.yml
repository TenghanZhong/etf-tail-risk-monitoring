name: Repository cleanup pull request

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update repository files
        run: python .github/repository_cleanup.py

      - name: Validate Python files
        run: |
          python -m py_compile run_tail_risk_monitoring.py compare_gjr_garch.py quality-layer.py plot.py
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          for filename in ["run_tail_risk_monitoring.py", "compare_gjr_garch.py", "quality-layer.py"]:
              spec = importlib.util.spec_from_file_location(filename.replace("-", "_"), filename)
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)
              assert isinstance(module.Config().base_dir, Path)
          PY

      - name: Commit cleaned repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean repository and fix configuration"
          git push origin main
